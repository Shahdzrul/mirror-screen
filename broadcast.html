<!DOCTYPE html>

<html>

<body>

<h1>CAST SCREEN</h1>

<button onclick="cast()">
START
</button>

<video
id="v"
autoplay
muted
playsinline
style="width:100%">
</video>

<script>

async function cast(){

const stream=
await navigator
.mediaDevices
.getDisplayMedia({
video:true
});

v.srcObject=
stream;

}

</script>

</body>

</html>
